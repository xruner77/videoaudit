    # API - PHP-FPM direct (Slim Framework)
    location ^~ /api/ {
        alias /www/wwwroot/va.xruner.tk/server/public/;
        try_files $uri $uri/ /api/index.php$is_args$args;

        location ~ \.php$ {
            fastcgi_pass unix:/www/server/php/81/var/run/php-cgi-81.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

