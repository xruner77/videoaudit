server
{
    client_max_body_size 50m;
    listen 80;
    listen 443 ssl ;
    server_name va.xruner.tk;
    index index.html index.htm;
    root /www/wwwroot/va.xruner.tk;
    include /www/server/panel/vhost/nginx/extension/va.xruner.tk/*.conf;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/va.xruner.tk/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/va.xruner.tk/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP引用配置，可以注释或修改
    include enable-php-81.conf;
    #PHP-INFO-END

    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效
    include /www/server/panel/vhost/rewrite/va.xruner.tk.conf;
    #REWRITE-END

    # API - PHP-FPM direct (Slim Framework)
    location ^~ /api/ {
        alias /www/wwwroot/va.xruner.tk/server/public/;
        
        if (!-e $request_filename) {
            rewrite ^/api/(.*)$ /api/index.php last;
        }

        location ~ \.php$ {

            fastcgi_pass unix:/www/server/php/81/var/run/php-cgi-81.sock;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param SCRIPT_NAME /index.php;
        }

    }

    # 视频文件服务
    location ^~ /uploads/ {
        alias /www/wwwroot/va.xruner.tk/server/uploads/;
        expires 30d;
        add_header Access-Control-Allow-Origin *;
    }


    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$
    {
        expires 12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    # SPA单页应用路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/va.xruner.tk.log;
    error_log /www/wwwlogs/va.xruner.tk.error.log;
}
